<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Notes finales</title>
    <style>
        table { border-collapse: collapse; width: 80%; margin: 20px auto; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #eee; }
        form { width: 80%; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
        form > * { flex: 1; }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nav">
                <a href="Type-Devis.html">type de devis</a>
                <a href="Demande.html">Demandes</a>
                <a href="Client.html">Client</a>
                <a href="Devis.html">Devis</a>
                <a href="Statut.html">Statut</a>
                
    </div>
<h1 style="text-align:center;">Calcul de la note finale</h1>
    <h1 style="text-align:center;">3582</h1>


<form id="form-calc">
    <select id="etudiant-select" required></select>
    <select id="matiere-select" required></select>
    <button type="submit">Calculer</button>
</form>

<div style="text-align:center; margin-top: 20px;">
    <strong>Dernière note finale calculée :</strong>
    <span id="note-result">-</span>
</div>

<table id="note-final-table">
    <thead>
    <tr><th>ID</th><th>Etudiant</th><th>Matière</th><th>Valeur</th></tr>
    </thead>
    <tbody>
    <!-- rangées insérées par JS -->
    </tbody>
</table>

<script>
async function loadData() {
    try {
        const [etudiantsResp, matieresResp, noteFinalResp] = await Promise.all([
            fetch('/api/etudiants'),
            fetch('/api/matieres'),
            fetch('/api/notes-finales')
        ]);

        const etudiants = await etudiantsResp.json();
        const matieres = await matieresResp.json();
        const noteFinals = await noteFinalResp.json();

        const etudiantSelect = document.getElementById('etudiant-select');
        const matiereSelect = document.getElementById('matiere-select');

        etudiantSelect.innerHTML = '<option value="">Choisir un étudiant</option>';
        matiereSelect.innerHTML = '<option value="">Choisir une matière</option>';

        etudiants.forEach(e => {
            etudiantSelect.innerHTML += `<option value="${e.id}">${e.nom}</option>`;
        });

        matieres.forEach(m => {
            matiereSelect.innerHTML += `<option value="${m.id}">${m.nom}</option>`;
        });

        renderNoteFinalTable(noteFinals);

    } catch (e) {
        console.error('Erreur lors du chargement des données', e);
    }
}

function renderNoteFinalTable(noteFinals) {
    const tbody = document.querySelector('#note-final-table tbody');
    tbody.innerHTML = '';
    noteFinals.forEach(nf => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${nf.id}</td>` +
                       `<td>${nf.etudiant?.nom || ''}</td>` +
                       `<td>${nf.matiere?.nom || ''}</td>` +
                       `<td>${nf.valeur.toFixed(2)}</td>`;
        tbody.appendChild(tr);
    });
}

async function calculerNoteFinale(etudiantId, matiereId) {
    try {
        const resp = await fetch(`/api/notes-finales/calc/${etudiantId}/${matiereId}`);
        if (!resp.ok) {
            alert('Erreur lors du calcul de la note finale');
            return;
        }
        const result = await resp.json();
        document.getElementById('note-result').innerText = result;
        await loadData();
    } catch (e) {
        console.error('Erreur lors du calcul de la note finale', e);
        alert('Erreur lors du calcul de la note finale');
    }
}

window.addEventListener('DOMContentLoaded', () => {
    loadData();

    document.getElementById('form-calc').addEventListener('submit', e => {
        e.preventDefault();
        const etudiantId = document.getElementById('etudiant-select').value;
        const matiereId = document.getElementById('matiere-select').value;
        if (!etudiantId || !matiereId) {
            alert('Veuillez sélectionner un étudiant et une matière');
            return;
        }
        calculerNoteFinale(etudiantId, matiereId);
    });
});
</script>
</body>
</html>
