<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Liste des élèves</title>
    <style>
        table { border-collapse: collapse; width: 80%; margin: 20px auto; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #eee; }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nav">
                <a href="note-final.html">note final</a>
                <a href="etudiant.html">Candidats</a>
                <a href="correcteur.html">Correcteurs</a>
                <a href="matiere.html">Matières</a>
                <a href="note.html">Notes</a>
                <a href="parametre.html">Paramètres</a>
                <a href="resolution.html">Resolution</a>
    </div>
    <h1 style="text-align:center;">Liste des correcteur</h1>
<form id="form-ajout">
    <input type="text" id="nom-correcteur" placeholder="Nom du correcteur" required>
    <button type="submit">Ajouter</button>
</form>

<table id="correcteur-table">
    <thead>
    <tr><th>id</th><th>nom</th></tr>
    </thead>
    <tbody>
    <!-- rangées insérées par JS -->
    </tbody>
</table>

<script>
async function loadNotes() {
    try {
        const resp = await fetch('/api/correcteurs');
        if (!resp.ok) {
            console.error('loadNotes failed', resp.status);
            return;
        }
        const correcteur = await resp.json();
        console.log('loaded correcteur', correcteur);
        const tbody = document.querySelector('#correcteur-table tbody');
        tbody.innerHTML = '';
        correcteur.forEach(e => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${e.id}</td>` +
                           `<td>${e.nom}</td>`+
                           '<td><button data-id="${e.id}" class="btn-supprimer">Supprimer</button></td>';
            tbody.appendChild(tr);

            tr.querySelector('.btn-supprimer').addEventListener('click', () => deleteCorrecteur(e.id));
        });

        document.getElementById('form-ajout').addEventListener('submit', e => {
        e.preventDefault();
        const nom = document.getElementById('nom-correcteur').value.trim();
        if (nom) {
            addCorrecteur(nom);
            document.getElementById('nom-correcteur').value = '';
        }
        });
    } catch (e) {
        console.error('error loading correcteur', e);
    }
}

async function addCorrecteur(nom) {
    try {
        const resp = await fetch('/api/correcteurs', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nom })
        });
        if (resp.ok) {
            alert('Correcteur ajouté');
            loadNotes();
        } else {
            alert('Erreur lors de l\'ajout');
        }
    } catch (e) {
        console.error('error adding correcteur', e);
        alert('Erreur lors de l\'ajout');
    }
}

async function deleteCorrecteur(id) {
    if (!confirm('Confirmer la suppression ?')) return;
    try {
        const resp = await fetch(`/api/correcteurs/${id}`, { method: 'DELETE' });
        if (resp.ok) {
            alert('Correcteur supprimé');
            loadNotes();
        } else {
            alert('Erreur lors de la suppression');
        }
    } catch (e) {
        console.error('error deleting correcteur', e);
        alert('Erreur lors de la suppression');
    }
}

loadNotes();

</script>
</body>
</html>
